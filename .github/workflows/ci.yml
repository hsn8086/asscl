name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: |
          cd packages/domain && dart pub get
          cd ../data && flutter pub get
          cd ../presentation && flutter pub get
          cd ../../apps/mobile && flutter pub get
      - name: Analyze domain
        run: cd packages/domain && dart analyze --fatal-infos
      - name: Analyze data
        run: cd packages/data && flutter analyze --fatal-infos
      - name: Analyze presentation
        run: cd packages/presentation && flutter analyze --fatal-infos
      - name: Analyze mobile
        run: cd apps/mobile && flutter analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: |
          cd packages/domain && dart pub get
          cd ../data && flutter pub get
          cd ../presentation && flutter pub get
          cd ../../apps/mobile && flutter pub get
      - name: Test domain
        run: cd packages/domain && dart test
      - name: Test data
        run: cd packages/data && flutter test
      - name: Test presentation
        run: cd packages/presentation && flutter test
      - name: Test mobile
        run: cd apps/mobile && flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: cd apps/mobile && flutter pub get
      - name: Build release APK
        run: cd apps/mobile && flutter build apk --release --build-number=${{ github.run_number }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' apps/mobile/pubspec.yaml | sed 's/version: //')
          BASE_VERSION=$(echo $VERSION | cut -d'+' -f1)
          BUILD=${{ github.run_number }}
          echo "tag=v${BASE_VERSION}+${BUILD}" >> "$GITHUB_OUTPUT"
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: release-artifacts
      - name: Rename APK
        run: mv release-artifacts/app-release.apk release-artifacts/asscl-${{ steps.version.outputs.tag }}.apk
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: release-artifacts/asscl-${{ steps.version.outputs.tag }}.apk
